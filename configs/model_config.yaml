model:
  name: "cv_classifier"
  version: "1.0.0"
  
training:
  test_size: 0.2
  random_state: 42
  n_folds: 5
  
catboost:
  iterations: 500
  learning_rate: 0.05
  depth: 6
  l2_leaf_reg: 3
  
bert:
  model_name: "DeepPavlov/rubert-base-cased"
  max_length: 512
  batch_size: 16
  epochs: 3
  learning_rate: 2e-5
  
features:
  max_tfidf_features: 10000
  ngram_range: [1, 2]
  use_skills: true
  
monitoring:
  track_with_mlflow: true
  log_artifacts: true
